<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sondage</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#ff9900;--accent-dk:#e68a00;--text:#232f3e;--muted:#6b7280;
  --bg:#f0f2f5;--card:#fff;--border:#e5e7eb;--r:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:#1a2332;padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.header-icon{font-size:22px}
.header h1{color:#fff;font-size:15px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.container{max-width:580px;margin:0 auto;padding:18px 14px}

/* Progress */
.progress-bar{height:5px;background:var(--border);border-radius:3px;margin-bottom:18px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease}
.progress-txt{font-size:12px;color:var(--muted);text-align:right;margin-top:5px;margin-bottom:18px}

/* Cards */
.card{background:var(--card);border-radius:var(--r);padding:22px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:14px}
.survey-hero{text-align:center;padding:28px 20px}
.survey-hero h2{font-size:22px;font-weight:800;margin-bottom:10px;line-height:1.25}
.survey-hero p{color:var(--muted);font-size:15px;line-height:1.6}

/* Form inputs */
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:13px;font-weight:700;margin-bottom:7px;color:var(--text)}
.req{color:#ef4444}
input[type=text]{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;transition:border-color .15s;background:#fff;-webkit-appearance:none}
input[type=text]:focus{outline:none;border-color:var(--accent)}
.hint{font-size:12px;color:var(--muted);margin-top:6px}

/* Question card */
.q-card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:12px}
.q-num{font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.q-text{font-size:16px;font-weight:700;line-height:1.4;margin-bottom:14px}

/* Radio / Checkbox */
.options{display:flex;flex-direction:column;gap:9px}
.opt-lbl{display:flex;align-items:center;gap:12px;padding:13px 16px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;font-size:15px;user-select:none}
.opt-lbl:hover{border-color:var(--accent);background:#fff7ed}
.opt-lbl.sel{border-color:var(--accent);background:#fff7ed}
input[type=radio],input[type=checkbox]{width:19px;height:19px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}

/* Text */
textarea{width:100%;padding:13px 16px;border:2px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;resize:vertical;min-height:90px;transition:border-color .15s;-webkit-appearance:none}
textarea:focus{outline:none;border-color:var(--accent)}

/* Rating */
.rating{display:flex;gap:8px;justify-content:center;margin-bottom:6px}
.r-btn{width:54px;height:54px;border:2px solid var(--border);border-radius:12px;font-size:20px;font-weight:800;cursor:pointer;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .18s;color:var(--text)}
.r-btn:active{transform:scale(.95)}
.r-btn.sel{border-color:var(--accent);background:var(--accent);color:#fff;transform:scale(1.06)}
.r-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);padding:0 4px}

/* Button */
.btn{display:block;width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;transition:all .15s;letter-spacing:.01em}
.btn:hover{background:var(--accent-dk);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Messages */
.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:13px 16px;border-radius:10px;font-size:14px;margin-bottom:12px}

/* Status screens */
.screen{text-align:center;padding:40px 20px}
.screen-icon{font-size:60px;margin-bottom:16px}
.screen h2{font-size:22px;font-weight:800;margin-bottom:10px}
.screen p{color:var(--muted);font-size:15px;line-height:1.6}

/* Spinner */
.spin{display:inline-block;width:28px;height:28px;border:3px solid rgba(255,153,0,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:32px auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">📋</span>
  <h1 id="header-title">Chargement…</h1>
</div>

<div class="container" id="app">
  <div class="card screen">
    <div class="spin"></div>
  </div>
</div>

<script>
const surveyId = location.pathname.split('/survey/')[1];
let survey   = null;
let answers  = {};
let login    = '';

const app = () => document.getElementById('app');
const h   = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Load survey ───────────────────────────────────────────────────────────────
async function load() {
  try {
    const r = await fetch(`/api/surveys/${surveyId}`);
    if (!r.ok) throw new Error('Sondage introuvable');
    survey = await r.json();
    document.getElementById('header-title').textContent = survey.title;
    if (!survey.is_active) {
      showScreen('🔒', 'Sondage fermé', 'Ce sondage est maintenant fermé. Merci pour votre participation !', '#6b7280');
      return;
    }
    showInfoStep();
  } catch(e) {
    showScreen('❌', 'Introuvable', 'Ce sondage n\'existe pas ou a été supprimé.', '#ef4444');
  }
}

// ── Step 1 : Info + Login ─────────────────────────────────────────────────────
function showInfoStep() {
  app().innerHTML = `
    <div class="card survey-hero">
      <h2>${h(survey.title)}</h2>
      ${survey.description ? `<p>${h(survey.description)}</p>` : ''}
    </div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">Votre login Amazon <span class="req">*</span></label>
        <input type="text" id="login-input" placeholder="ex : jdupont"
          autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false">
        <p class="hint">🔒 Votre identifiant sera associé à vos réponses (visible uniquement par l'administrateur)</p>
      </div>
      <div id="login-err"></div>
      <button class="btn" onclick="startSurvey()">Commencer →</button>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:12px">
      ${survey.questions.length} question${survey.questions.length !== 1 ? 's' : ''}
    </p>`;
  setTimeout(() => document.getElementById('login-input')?.focus(), 100);
  document.getElementById('login-input').addEventListener('keydown', e => { if (e.key==='Enter') startSurvey(); });
}

function startSurvey() {
  const inp = document.getElementById('login-input');
  const err = document.getElementById('login-err');
  const val = inp.value.trim();
  if (!val) { err.innerHTML = `<div class="error">Veuillez entrer votre login Amazon.</div>`; inp.focus(); return; }
  if (!/^[a-zA-Z0-9._\-]{2,50}$/.test(val)) {
    err.innerHTML = `<div class="error">Login invalide — lettres, chiffres, tirets et points uniquement.</div>`; return;
  }
  login = val.toLowerCase();
  showQuestionsStep();
}

// ── Step 2 : Questions ────────────────────────────────────────────────────────
function showQuestionsStep() {
  const n = survey.questions.length;
  app().innerHTML = `
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="progress-txt" id="prog-txt">0 / ${n} répondu${n > 1 ? 's' : ''}</div>
    ${survey.questions.map((q, i) => questionCard(q, i)).join('')}
    <div id="sub-err"></div>
    <button class="btn" id="sub-btn" onclick="submit()">Envoyer mes réponses ✓</button>
    <div style="height:32px"></div>`;
  updateProgress();
}

function questionCard(q, i) {
  let input = '';
  if (q.type === 'radio') {
    input = `<div class="options" id="opts-${i}">${q.options.map((opt, oi) => `
      <label class="opt-lbl" id="ol-${i}-${oi}">
        <input type="radio" name="q${i}" value="${h(opt)}" onchange="answers[${i}]=this.value;styleOpts(${i});updateProgress()">
        ${h(opt)}
      </label>`).join('')}</div>`;
  } else if (q.type === 'checkbox') {
    input = `<div class="options" id="opts-${i}">${q.options.map((opt, oi) => `
      <label class="opt-lbl" id="ol-${i}-${oi}">
        <input type="checkbox" name="q${i}" value="${h(opt)}" onchange="syncCheckbox(${i});styleOpts(${i});updateProgress()">
        ${h(opt)}
      </label>`).join('')}</div>`;
  } else if (q.type === 'text') {
    input = `<textarea placeholder="Votre réponse…" oninput="answers[${i}]=this.value.trim();updateProgress()"></textarea>`;
  } else if (q.type === 'rating') {
    input = `
      <div class="rating" id="rating-${i}">
        ${[1,2,3,4,5].map(n => `<button class="r-btn" type="button" onclick="setRating(${i},${n})">${n}</button>`).join('')}
      </div>
      <div class="r-labels"><span>😕 Mauvais</span><span>😊 Excellent</span></div>`;
  }
  return `
    <div class="q-card" id="qc-${i}">
      <div class="q-num">Question ${i+1} / ${survey.questions.length}</div>
      <div class="q-text">${h(q.text)} <span class="req">*</span></div>
      ${input}
    </div>`;
}

function styleOpts(idx) {
  const q = survey.questions[idx];
  if (q.type === 'radio') {
    q.options.forEach((opt, oi) => {
      const el = document.getElementById(`ol-${idx}-${oi}`);
      if (el) el.classList.toggle('sel', answers[idx] === opt);
    });
  } else if (q.type === 'checkbox') {
    const sel = answers[idx] || [];
    q.options.forEach((opt, oi) => {
      const el = document.getElementById(`ol-${idx}-${oi}`);
      if (el) el.classList.toggle('sel', sel.includes(opt));
    });
  }
}

function syncCheckbox(idx) {
  const cbs = document.querySelectorAll(`input[name="q${idx}"]:checked`);
  answers[idx] = Array.from(cbs).map(c => c.value);
}

function setRating(idx, val) {
  answers[idx] = val;
  document.querySelectorAll(`#rating-${idx} .r-btn`).forEach((btn, i) => {
    btn.classList.toggle('sel', i < val);
  });
  updateProgress();
}

function updateProgress() {
  let done = 0;
  survey.questions.forEach((q, i) => {
    const a = answers[i];
    if (q.type === 'text'     && typeof a === 'string' && a.trim()) done++;
    else if (q.type === 'rating'   && a) done++;
    else if (q.type === 'radio'    && a) done++;
    else if (q.type === 'checkbox' && Array.isArray(a) && a.length) done++;
  });
  const n = survey.questions.length;
  const el = document.getElementById('prog');
  const tx = document.getElementById('prog-txt');
  if (el) el.style.width = (n > 0 ? done/n*100 : 0) + '%';
  if (tx) tx.textContent = `${done} / ${n} répondu${n > 1 ? 's' : ''}`;
}

// ── Submit ─────────────────────────────────────────────────────────────────────
async function submit() {
  const err = document.getElementById('sub-err');
  const btn = document.getElementById('sub-btn');
  err.innerHTML = '';

  for (const [i, q] of survey.questions.entries()) {
    const a = answers[i];
    const empty = a === undefined || a === null || a === '' || (Array.isArray(a) && !a.length);
    if (empty) {
      err.innerHTML = `<div class="error">⚠️ Veuillez répondre à la question ${i+1}.</div>`;
      document.getElementById(`qc-${i}`).scrollIntoView({ behavior:'smooth', block:'center' });
      return;
    }
  }

  btn.disabled = true; btn.textContent = 'Envoi en cours…';

  try {
    const r = await fetch(`/api/surveys/${surveyId}/submit`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ login, answers })
    });
    const d = await r.json();
    if (!r.ok) {
      if (r.status === 409) {
        showScreen('⚠️', 'Déjà participé', 'Vous avez déjà répondu à ce sondage. Une seule participation est autorisée par associate.', '#f59e0b');
      } else {
        throw new Error(d.error || 'Erreur serveur');
      }
      return;
    }
    showScreen('✅', 'Merci !', 'Vos réponses ont bien été enregistrées.<br>Votre participation est appréciée.', '#16a34a');
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Envoyer mes réponses ✓';
    err.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

// ── Status screen ─────────────────────────────────────────────────────────────
function showScreen(icon, title, msg, color) {
  document.getElementById('header-title').textContent = title;
  app().innerHTML = `
    <div class="card screen">
      <div class="screen-icon">${icon}</div>
      <h2 style="color:${color}">${title}</h2>
      <p>${msg}</p>
    </div>`;
}

load();
</script>
</body>
</html>
