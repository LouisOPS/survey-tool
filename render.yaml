services:
  - type: web
    name: survey-tool
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: survey-db
          property: connectionString

databases:
  - name: survey-db
    databaseName: survey_tool
    user: survey_admin
    plan: free
